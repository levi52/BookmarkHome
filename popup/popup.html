<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookmarkHome</title>
  <style>
    :root {
      --bg: #0f1117;
      --bg2: #1a1d27;
      --bg3: #1e2130;
      --accent: #6c63ff;
      --text: #e8eaf6;
      --text2: #9095a8;
      --text3: #5a5f72;
      --border: rgba(255,255,255,0.07);
      --radius: 10px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      max-height: 580px;
      font-family: 'Inter','PingFang SC','Microsoft YaHei',system-ui,sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* 顶部 */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border);
    }
    .logo { font-size: 18px; }
    .title { font-size: 15px; font-weight: 700; flex: 1; }
    .open-btn {
      font-size: 11px;
      color: var(--accent);
      background: none;
      border: 1px solid rgba(108,99,255,0.3);
      border-radius: 6px;
      padding: 3px 8px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .open-btn:hover { background: rgba(108,99,255,0.15); }

    /* 搜索 */
    .search-wrap {
      position: relative;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    .search-icon {
      position: absolute;
      left: 22px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      pointer-events: none;
    }
    #searchInput {
      width: 100%;
      height: 36px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 0 36px 0 38px;
      font-size: 13px;
      color: var(--text);
      outline: none;
    }
    #searchInput:focus { border-color: var(--accent); }
    #searchInput::placeholder { color: var(--text3); }

    /* 结果列表 */
    .results {
      overflow-y: auto;
      max-height: 460px;
    }
    .result-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      text-decoration: none;
      color: var(--text);
      transition: background 0.15s;
      border-bottom: 1px solid var(--border);
    }
    .result-item:hover { background: var(--bg3); }
    .result-favicon {
      width: 16px; height: 16px;
      border-radius: 3px;
      flex-shrink: 0;
      object-fit: contain;
    }
    .result-info { flex: 1; min-width: 0; }
    .result-title {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .result-domain {
      font-size: 11px;
      color: var(--text3);
    }

    .section-title {
      padding: 8px 14px 4px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* 最近书签区 */
    .recent-section { padding-bottom: 8px; }

    /* 空/Loading */
    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 120px;
      gap: 8px;
      color: var(--text3);
      font-size: 13px;
    }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🔖</span>
    <span class="title">BookmarkHome</span>
    <button class="open-btn" id="openNewtab">打开主页</button>
  </div>

  <div class="search-wrap">
    <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="searchInput" placeholder="搜索书签..." autocomplete="off" autofocus>
  </div>

  <div class="results" id="results">
    <div class="placeholder">
      <div class="spinner"></div>
      <span>加载中...</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
