<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookmarkHome</title>
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <!-- 顶部导航 -->
  <header class="header">
    <a class="header-logo" href="#">
      <div class="logo-icon">🔖</div>
      <span class="logo-text">BookmarkHome</span>
    </a>

    <!-- 搜索框 -->
    <div class="search-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input
        type="text"
        id="searchInput"
        placeholder="搜索收藏夹..."
        autocomplete="off"
        spellcheck="false"
      />
      <button class="search-clear" id="searchClear" title="清除搜索">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- 工具按钮 -->
    <div class="header-actions">
      <button class="icon-btn" id="btnCollapseAll" title="折叠所有文件夹">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 6h16M4 12h10M4 18h6"/>
        </svg>
      </button>
      <button class="icon-btn" id="btnExpandAll" title="展开所有文件夹">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <div class="header-divider"></div>
      <button class="icon-btn" id="btnTheme" title="切换主题">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button class="icon-btn" id="btnRefresh" title="刷新收藏夹">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- 统计栏 + 根节点 Tab -->
  <div class="stats-bar" id="statsBar">
    <div class="stats-left">
      <div class="stat-item">📁 <strong id="statCategories">-</strong> 个分类</div>
      <div class="stat-item">🔖 <strong id="statBookmarks">-</strong> 条书签</div>
    </div>
    <div class="root-tabs" id="rootTabs">
      <!-- JS 动态填充 -->
    </div>
  </div>

  <!-- 面包屑导航 -->
  <nav class="breadcrumb" id="breadcrumb" style="display:none">
    <button class="breadcrumb-item" data-depth="-1">🏠 首页</button>
  </nav>

  <!-- 主内容 -->
  <main class="main" id="main">
    <!-- Loading 状态 -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>正在读取收藏夹...</p>
    </div>

    <!-- 搜索结果 -->
    <div id="searchResults">
      <p class="search-results-title">找到 <span id="searchCount">0</span> 个结果</p>
      <div class="search-grid" id="searchGrid"></div>
    </div>

    <!-- 分类展示 -->
    <div class="categories-grid" id="categoriesGrid"></div>

    <!-- 空状态 -->
    <div class="empty-state" id="emptyState" style="display:none">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
      </svg>
      <h3>暂无收藏夹数据</h3>
      <p>请先在浏览器中添加书签，然后刷新此页面</p>
    </div>
  </main>

  <!-- Toast 通知 -->
  <div class="toast" id="toast"></div>

  <script src="newtab.js"></script>
</body>
</html>
